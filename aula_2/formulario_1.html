<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exemplo de Formulário com JavaScript</title>
<script src="script.js" defer></script>
<link rel="stylesheet" href="css/rel.css"> 
</head>
<body>
    <div  class="card" style="width: 36rem;" >
    <img src="math.jpg">
    <h1 class="card-body">Calculadora de Quadrado</h1>
    <form id="numeroForm">
        <label for="numero">Digite um número:</label>
        <label for="operator"></label>
        <input type="number" id="numero" name="numero" required>
        
        <select id="operator"> 
            <option value="quadratic">Quadrado</option>
            <option value="cubic">Cubico</option>
        </select>
        
        <button type="submit">Calcular</button>
    
    </form>    
    <p>O resultado é: <span id="resultado"></span></p>
    </div>
<br>


<div class="card" style="width: 18rem;">
    <div class="card-body">
      <h5 class="card-title">Calculando o quadrado de um numero</h5>
      <h6 class="card-subtitle mb-2 text-body-secondary">Card subtitle</h6>
      <p class="card-text" id="resultado_1">Some quick example text to build on the card title and make up the bulk of the card’s content.</p>
      <a href="#" class="card-link">Card link</a>
      <a href="#" class="card-link">Another link</a>
    </div>
  </div>
</body>
</html>
